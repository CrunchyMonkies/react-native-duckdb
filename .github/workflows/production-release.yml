name: Production Release (Android · GitHub Packages)

# Cross-compiles the native Android library (libRNDuckDB.so) for every supported ABI,
# for each published feature set (core, all), and uploads them as assets on a *public*
# GitHub Release (vX.Y.Z) so consumer Gradle builds can download the matching binary at
# build time with no authentication. The scoped npm package
# (@crunchymonkies/react-native-duckdb) is published to GitHub Packages and carries the
# Gradle logic that performs that download (and the clone + source-build fallback).
#
# Asset naming: libRNDuckDB-<version>-<features>-<abi>.so  (+ .sha256 sidecar)
#
# Trigger: push to the `production` branch (version is taken from package/package.json
# as-is). The existing tag-based release.yml (npm.org, source-only) is left untouched.

on:
  push:
    branches: [production]
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release that hosts the prebuilt .so assets
  packages: write

concurrency:
  group: production-release
  cancel-in-progress: false

env:
  # All four supported Android ABIs. httpfs/vss are auto-skipped on the 32-bit ABIs
  # (armeabi-v7a, x86) by package/android/CMakeLists.txt.
  ABIS: "armeabi-v7a,x86,x86_64,arm64-v8a"
  NDK_VERSION: "27.1.12297006"
  CMAKE_VERSION: "3.22.1"

jobs:
  # 1. Resolve the version and ensure the Release exists, so the parallel build matrix
  #    can upload assets into it without racing to create it.
  release-init:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        run: |
          set -euxo pipefail
          version="$(cd package && node -p "require('./package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Ensure Release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          tag="v${{ steps.version.outputs.version }}"
          if ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" \
              --target "${GITHUB_SHA}" \
              --title "${tag}" \
              --notes "Prebuilt Android native libraries (libRNDuckDB.so) for feature sets: core, all."
          fi

  # 2. Build the native library for each feature set (core, all) × all ABIs and upload
  #    the per-ABI .so + .sha256 to the Release.
  build:
    needs: release-init
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        features: [core, all]
    env:
      VERSION: ${{ needs.release-init.outputs.version }}
    steps:
      - name: Checkout (with DuckDB submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # 1.3.1 (the repo's packageManager pin) uses a non-hoisted node_modules
          # layout that breaks the example's settings.gradle includeBuild of
          # ../../node_modules/@react-native/gradle-plugin. A newer bun hoists to the
          # workspace root, which is what the Gradle setup expects.
          bun-version: "1.3.14"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake
        run: |
          set -euxo pipefail
          sdkmanager --install "ndk;${NDK_VERSION}" "cmake;${CMAKE_VERSION}"
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ matrix.features }}-${{ hashFiles('example/android/**/*.gradle*', 'package/android/**/*.gradle*', 'package/android/CMakeLists.txt') }}
          restore-keys: |
            gradle-${{ runner.os }}-${{ matrix.features }}-
            gradle-${{ runner.os }}-

      - name: Cache vendored OpenSSL/curl
        uses: actions/cache@v4
        with:
          path: |
            package/vendor/openssl
            package/vendor/curl
          key: vendor-${{ runner.os }}-${{ matrix.features }}-${{ hashFiles('package/scripts/build-openssl-curl.sh') }}
          restore-keys: |
            vendor-${{ runner.os }}-${{ matrix.features }}-

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build native libraries (${{ matrix.features }}) for all ABIs
        working-directory: example/android
        run: |
          set -euxo pipefail
          ./gradlew :react-native-duckdb:assembleRelease \
            -PnewArchEnabled=true \
            -PRNDuckDB_prebuilt=false \
            -PDUCKDB_FEATURES="${{ matrix.features }}" \
            -PreactNativeArchitectures="${ABIS}" \
            --no-daemon --stacktrace

      - name: Stage prebuilt libraries + checksums
        run: |
          set -euxo pipefail
          aar="$(find package/android/build/outputs/aar -name '*-release.aar' | head -n1)"
          if [ -z "${aar}" ]; then
            echo "::error::No release AAR produced by the Android build"
            exit 1
          fi
          echo "Using AAR: ${aar}"
          work="$(mktemp -d)"
          unzip -o "${aar}" -d "${work}" >/dev/null
          mkdir -p dist
          IFS=',' read -ra abis <<< "${ABIS}"
          for abi in "${abis[@]}"; do
            so="${work}/jni/${abi}/libRNDuckDB.so"
            if [ ! -f "${so}" ]; then
              echo "::error::Missing libRNDuckDB.so for ABI ${abi} in AAR"
              exit 1
            fi
            asset="libRNDuckDB-${VERSION}-${{ matrix.features }}-${abi}.so"
            cp "${so}" "dist/${asset}"
            ( cd dist && sha256sum "${asset}" > "${asset}.sha256" )
          done
          echo "Release assets staged (${{ matrix.features }}):"
          ls -lh dist

      # Hosts the prebuilt .so on the *public* GitHub Release so consumer Gradle
      # builds can download them at build time without any authentication.
      - name: Upload prebuilt libraries to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${VERSION}" dist/* --clobber

  # 3. Publish the scoped npm package once, after both feature sets are built.
  publish-npm:
    needs: [release-init, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Set up Node (GitHub Packages registry)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@crunchymonkies"

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build JS package
        working-directory: package
        run: bun run build

      - name: Configure package for GitHub Packages
        working-directory: package
        run: |
          set -euxo pipefail
          # GitHub Packages npm requires the package to be scoped to the owning org.
          # Done here (not in source package.json) so the npm.org release.yml is unaffected.
          npm pkg set name='@crunchymonkies/react-native-duckdb'
          npm pkg set publishConfig.registry='https://npm.pkg.github.com'
          echo "Publishing version: ${{ needs.release-init.outputs.version }}"

      - name: Publish to GitHub Packages
        working-directory: package
        run: npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
