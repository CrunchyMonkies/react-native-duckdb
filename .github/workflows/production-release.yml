name: Production Release (Android · GitHub Packages)

# Cross-compiles the native Android library (libRNDuckDB.so) for every supported
# ABI, bundles the prebuilt binaries into the npm package, and publishes the scoped
# package to the CrunchyMonkies GitHub Packages npm registry.
#
# Trigger: push to the `production` branch (version is taken from package/package.json
# as-is). The existing tag-based release.yml (npm.org, source-only) is left untouched.

on:
  push:
    branches: [production]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-release
  cancel-in-progress: false

env:
  # All four supported Android ABIs. httpfs/vss are auto-skipped on the 32-bit ABIs
  # (armeabi-v7a, x86) by package/android/CMakeLists.txt.
  ABIS: "armeabi-v7a,x86,x86_64,arm64-v8a"
  NDK_VERSION: "27.1.12297006"
  CMAKE_VERSION: "3.22.1"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout (with DuckDB submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.1"

      - name: Set up Node (GitHub Packages registry)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@crunchymonkies"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake
        run: |
          set -euxo pipefail
          sdkmanager --install "ndk;${NDK_VERSION}" "cmake;${CMAKE_VERSION}"
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('example/android/**/*.gradle*', 'package/android/**/*.gradle*', 'package/android/CMakeLists.txt') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache vendored OpenSSL/curl
        uses: actions/cache@v4
        with:
          path: |
            package/vendor/openssl
            package/vendor/curl
          key: vendor-${{ runner.os }}-${{ hashFiles('scripts/build-openssl-curl.sh') }}
          restore-keys: |
            vendor-${{ runner.os }}-

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build native libraries for all ABIs
        working-directory: example/android
        run: |
          set -euxo pipefail
          ./gradlew :react-native-duckdb:assembleRelease \
            -PnewArchEnabled=true \
            -PreactNativeArchitectures="${ABIS}" \
            --no-daemon --stacktrace

      - name: Extract prebuilt .so into jniLibs
        run: |
          set -euxo pipefail
          aar="$(find package/android/build/outputs/aar -name '*-release.aar' | head -n1)"
          if [ -z "${aar}" ]; then
            echo "::error::No release AAR produced by the Android build"
            exit 1
          fi
          echo "Using AAR: ${aar}"
          work="$(mktemp -d)"
          unzip -o "${aar}" -d "${work}" >/dev/null
          IFS=',' read -ra abis <<< "${ABIS}"
          for abi in "${abis[@]}"; do
            so="${work}/jni/${abi}/libRNDuckDB.so"
            if [ ! -f "${so}" ]; then
              echo "::error::Missing libRNDuckDB.so for ABI ${abi} in AAR"
              exit 1
            fi
            mkdir -p "package/android/src/main/jniLibs/${abi}"
            cp "${so}" "package/android/src/main/jniLibs/${abi}/libRNDuckDB.so"
          done
          echo "Prebuilt libraries staged:"
          find package/android/src/main/jniLibs -name 'libRNDuckDB.so' -exec ls -lh {} +

      - name: Build JS package
        working-directory: package
        run: bun run build

      - name: Configure package for GitHub Packages
        working-directory: package
        run: |
          set -euxo pipefail
          # GitHub Packages npm requires the package to be scoped to the owning org.
          # Done here (not in source package.json) so the npm.org release.yml is unaffected.
          npm pkg set name='@crunchymonkies/react-native-duckdb'
          npm pkg set publishConfig.registry='https://npm.pkg.github.com'
          echo "Publishing version: $(npm pkg get version | tr -d '\"')"

      - name: Verify prebuilt libs are in the tarball
        working-directory: package
        run: |
          set -euxo pipefail
          npm pack --dry-run --ignore-scripts > /tmp/pack.txt 2>&1
          cat /tmp/pack.txt
          IFS=',' read -ra abis <<< "${ABIS}"
          for abi in "${abis[@]}"; do
            if ! grep -q "android/src/main/jniLibs/${abi}/libRNDuckDB.so" /tmp/pack.txt; then
              echo "::error::Tarball is missing libRNDuckDB.so for ${abi}"
              exit 1
            fi
          done

      - name: Publish to GitHub Packages
        working-directory: package
        run: npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
